<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>claculator</title>
</head>
<body>
    <h1>¡Buenos días! Yo soy Shreya. ¿Qué tal?</h1>
    <h3>“He hecho una calculadora usando HTML, CSS y JavaScript.”</h3>
    <section class="calc-container">
        <div class="screen">
            <input type="text" name="calculator number" placeholder="enter number" required>
        </div>

        <div class="number">
            <button class="first">1</button>
            <button class="second">2</button>
            <button class="three">3</button>
            <button class="four">4</button>
            <button class="five">5</button>
            <button class="six">6</button>
            <button class="seven">7</button>
            <button class="eight">8</button>
            <button class="nine">9</button>
            <button class="ten">0</button>
            <button class="zero">00</button>
        </div>

        <div class="symbols">
            <button class="plus">+</button>
            <button class="minus">-</button>
            <button class="mul">*</button>
            <button class="div">/</button>
            <button class="power">^</button>
            <button class="clear">C</button>
            <button class="Ac">AC</button>
            <button class="equal">=</button>
        </div>

        <div class="brackets">
            <button class="curly-l">{</button>
            <button class="curly-r">}</button>
            <button class="rec-l">[</button>
            <button class="rec-r">]</button>
            <button class="curve-l">(</button>
            <button class="curve-r">)</button>
            <button class="rem">%</button>
        </div>
    </section>
</body>
</html>
